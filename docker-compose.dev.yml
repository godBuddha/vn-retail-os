services:
  postgres:
    image: postgres:16-alpine
    container_name: retail_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: retail_management
      POSTGRES_USER: retail_admin
      POSTGRES_PASSWORD: Retail@2024Secure!
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U retail_admin -d retail_management"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: retail_redis
    restart: unless-stopped
    command: redis-server --requirepass Redis@2024Secure!
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "Redis@2024Secure!", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  maildev:
    image: maildev/maildev
    container_name: retail_maildev
    restart: unless-stopped
    ports:
      - "1080:1080"
      - "1025:1025"

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    name: retail_network
